name: 라라스윗 빙과 광고 데이터 백필

on:
  workflow_dispatch:
    inputs:
      since:
        description: '시작일 (YYYY-MM-DD, 예: 2026-01-01)'
        required: true
      until:
        description: '종료일 (YYYY-MM-DD, 예: 2026-05-31)'
        required: true
      link_min_spend:
        description: '인스타 링크를 붙일 소재 최소 광고비 (원). 이 금액 이상 쓴 소재만 링크 조회'
        required: false
        default: '1000000'

# 데이터 쓰는 워크플로(백필·일일·새로고침)를 같은 그룹으로 묶어 동시 실행 방지(순차 대기)
concurrency:
  group: lalasweet-data-write
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    env:
      BACKFILL_SINCE: "${{ github.event.inputs.since }}"
      BACKFILL_UNTIL: "${{ github.event.inputs.until }}"
      LINK_MIN_SPEND: "${{ github.event.inputs.link_min_spend }}"
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests pandas pyarrow gspread google-auth

      - name: 기존 raw CSV 삭제
        run: git rm -f --ignore-unmatch data/meta_raw_*.csv data/tiktok_raw_*.csv || true

      - name: 메타 데이터 수집 (백필)
        env:
          META_ACCESS_TOKEN: "${{ secrets.META_ACCESS_TOKEN }}"
          META_AD_ACCOUNT_ID: "${{ secrets.META_AD_ACCOUNT_ID }}"
          META_AD_ACCOUNT_ID_SUB: "act_550617335901928"   # 서브 계정 = 인지광고
          SLACK_BOT_TOKEN: "${{ secrets.SLACK_BOT_TOKEN }}"
          SLACK_USER_ID: "${{ secrets.SLACK_USER_ID }}"
        run: python scripts/meta_api.py

      - name: 틱톡 데이터 수집 (백필)
        env:
          TIKTOK_ACCESS_TOKEN: "${{ secrets.TIKTOK_ACCESS_TOKEN }}"
          TIKTOK_ADVERTISER_ID: "${{ secrets.TIKTOK_ADVERTISER_ID }}"
          SLACK_BOT_TOKEN: "${{ secrets.SLACK_BOT_TOKEN }}"
          SLACK_USER_ID: "${{ secrets.SLACK_USER_ID }}"
        run: python scripts/tiktok_api.py

      - name: 인스타 광고페이지 링크 조회
        env:
          META_ACCESS_TOKEN: "${{ secrets.META_ACCESS_TOKEN }}"
        run: python scripts/fetch_ig_links.py

      - name: 구글애즈(유튜브) 시트 → raw (백필)
        env:
          SPREADSHEET_ID: "${{ secrets.SPREADSHEET_ID }}"
          GCP_SERVICE_ACCOUNT_JSON: "${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}"
        run: python scripts/google_sheet_to_raw.py

      - name: 통합 RD 빌드
        run: python scripts/build_rd.py

      - name: Google Sheets 동기화
        env:
          SPREADSHEET_ID: "${{ secrets.SPREADSHEET_ID }}"
          GCP_SERVICE_ACCOUNT_JSON: "${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}"
        run: python scripts/sync_to_sheets.py

      - name: 데이터 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "변경 없음"; exit 0
          fi
          git commit -m "백필: ${{ github.event.inputs.since }} ~ ${{ github.event.inputs.until }}"
          # 원격이 앞서 있으면 rebase, 데이터 파일 충돌 시엔 이번 백필 결과를 우선 채택
          for i in 1 2 3 4 5; do
            if git push origin main; then echo "푸시 성공"; exit 0; fi
            echo "재시도 $i: 원격 갱신 반영"
            git fetch origin main
            if ! git rebase origin/main; then
              echo "데이터 충돌 → 이번 백필 결과 우선"
              git rebase --abort || true
              git merge -s ours -m "원격 병합(백필 데이터 유지)" origin/main || true
            fi
            sleep 3
          done
          echo "푸시 실패"; exit 1
